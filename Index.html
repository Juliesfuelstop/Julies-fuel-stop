        .navbar a:hover {

        .hero {

        .item-price {

        function Reviews() {
            const [reviews, setReviews] = React.useState([]);
            const [loading, setLoading] = React.useState(true);

            React.useEffect(() => {
                fetch('https://maps.googleapis.com/maps/api/place/details/json?place_id=ChIJkXjRA-AQXIgRQUNmWuhtVfc&fields=reviews&key=AIzaSyAQQyZkFi5RCq-TydVnG2lHawKm2Mp1_1k')
                    .then(response => response.json())
                    .then(data => {
                        if (data.result && data.result.reviews) {
                            setReviews(data.result.reviews.slice(0, 3)); // Display up to 3 reviews
                        }
                        setLoading(false);
                    })
                    .catch(error => {
                        console.error('Error fetching reviews:', error);
                        setLoading(false);
                    });
            }, []);

            if (loading) {
                return (
                    <div className="section">
                        <h2>What Our Customers Say</h2>
                        <p className="text-center">Loading reviews...</p>
                    </div>
                );
            }

            if (reviews.length === 0) {
                return (
                    <div className="section">
                        <h2>What Our Customers Say</h2>
                        <p className="text-center">No reviews available yet. Be the first to leave one!</p>
                        <p className="text-center mt-4">
                            <a href="https://www.google.com/maps/place/?q=place_id:ChIJkXjRA-AQXIgRQUNmWuhtVfc" target="_blank" className="text-[#E8B923]">Leave a review on Google</a>
                        </p>
                    </div>
                );
            }

            return (
                <div className="section">
                    <h2>What Our Customers Say</h2>
                    <div className="reviews-grid">
                        {reviews.map((review, index) => (
                            <div key={index} className="review-card">
                                <p>"{review.text}"</p>
                                <div className="stars">{'★'.repeat(review.rating)}{'☆'.repeat(5 - review.rating)}</div>
                                <p>- {review.author_name}</p>
                            </div>
                        ))}
                    </div>
                    <p className="text-center mt-4">
                        <a href="https://www.google.com/maps/place/?q=place_id:ChIJkXjRA-AQXIgRQUNmWuhtVfc" target="_blank" className="text-[#E8B923]">See more on Google</a>
                    </p>
                </div>
            );
        }
