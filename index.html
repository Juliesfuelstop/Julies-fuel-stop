<script type="text/javascript">
        var gk_isXlsx = false;
        var gk_xlsxFileLookup = {};
        var gk_fileData = {};
        function filledCell(cell) {
          return cell !== '' && cell != null;
        }
        function loadFileData(filename) {
        if (gk_isXlsx && gk_xlsxFileLookup[filename]) {
            try {
                var workbook = XLSX.read(gk_fileData[filename], { type: 'base64' });
                var firstSheetName = workbook.SheetNames[0];
                var worksheet = workbook.Sheets[firstSheetName];

                // Convert sheet to JSON to filter blank rows
                var jsonData = XLSX.utils.sheet_to_json(worksheet, { header: 1, blankrows: false, defval: '' });
                // Filter out blank rows (rows where all cells are empty, null, or undefined)
                var filteredData = jsonData.filter(row => row.some(filledCell));

                // Heuristic to find the header row by ignoring rows with fewer filled cells than the next row
                var headerRowIndex = filteredData.findIndex((row, index) =>
                  row.filter(filledCell).length >= filteredData[index + 1]?.filter(filledCell).length
                );
                // Fallback
                if (headerRowIndex === -1 || headerRowIndex > 25) {
                  headerRowIndex = 0;
                }

                // Convert filtered JSON back to CSV
                var csv = XLSX.utils.aoa_to_sheet(filteredData.slice(headerRowIndex)); // Create a new sheet from filtered array of arrays
                csv = XLSX.utils.sheet_to_csv(csv, { header: 1 });
                return csv;
            } catch (e) {
                console.error(e);
                return "";
            }
        }
        return gk_fileData[filename] || "";
        }

                }
            }, []);

            const addToCart = (item) => {
                setCartItems([...cartItems, item]);
            };

            const removeFromCart = (name) => {
                setCartItems(cartItems.filter(item => item.name !== name));
            };

            const handlePayment = async (total) => {
                if (!cartItems.length) {
                    document.getElementById('card-errors').textContent = 'Please add at least one item to proceed.';
                    return;
                }
                if (total <= 0) {
                    document.getElementById('card-errors').textContent = 'Total amount must be greater than $0.';
                    return;
                }
                if (stripe && cardElement) {
                    const { error, token } = await stripe.createToken(cardElement);
                    if (error) {
                        document.getElementById('card-errors').textContent = error.message;
                    } else {
                        document.getElementById('card-errors').textContent = '';
                        alert('Payment token created successfully! Total: $' + total.toFixed(2) + '\nToken ID: ' + token.id);
                        setCartItems([]);
                        setTipAmount(0);
                        cardElement.clear();
                    }
                } else {
                    document.getElementById('card-errors').textContent = 'Stripe initialization failed. Please try again.';
                }
            };

            return (
                <ErrorBoundary>
                    <div>
                        {/* Navbar */}
                        <nav className="bg-blue-600 p-4 text-white">
                            <div className="container mx-auto flex justify-between items-center">
                                <div className="flex items-center">
                                    <svg className="w-25 h-25 mr-2" viewBox="0 0 100 100" fill="none">
                                        <defs>
                                            <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                                                <stop offset="0%" style="stop-color:#2563EB;" />
                                                <stop offset="100%" style="stop-color:#FBBF24;" />
                                            </linearGradient>
                                        </defs>
                                        <circle cx="50" cy="50" r="48" fill="#ffffff" stroke="#2563EB" strokeWidth="4"/>
                                        <path d="M30 30 L40 20 L50 30 L60 20 L70 30" fill="none" stroke="url(#logoGradient)" strokeWidth="4"/>
                                        <path d="M30 70 Q50 50 70 70" fill="none" stroke="url(#logoGradient)" strokeWidth="4"/>
                                        <path d="M20 50 A 30 30 0 0 1 80 50" fill="none" stroke="url(#logoGradient)" strokeWidth="2" strokeDasharray="5 5"/>
                                        <text x="25" y="90" fontSize="10" fill="url(#logoGradient)" textAnchor="middle" transform="rotate(-5 50 90)">
                                            <tspan dy="-0.5em">Julie's</tspan>
                                            <tspan x="25" dy="1em">Deli and Fuel Stop</tspan>
                                        </text>
                                    </svg>
                                    <h1 className="text-2xl font-bold">Julie's Deli and Fuel Stop</h1>
                                </div>
                                <div className="space-x-4">
                                    <a href="#home" className="hover:underline">Home</a>
                                    <a href="#promotions" className="hover:underline">Promotions</a>
                                    <a href="#menu" className="hover:underline">Menu</a>
                                    <a href="#reviews" className="hover:underline">Reviews</a>
                                    <a href="#about" className="hover:underline">About</a>
                                    <a href="#contact" className="hover:underline">Contact</a>
                                </div>
                            </div>
                        </nav>

                        {/* Hero Section */}
                        <section id="home" className="container mx-auto py-12 text-center">
                            <h2 className="text-4xl font-bold mb-4">Welcome to Julie's Deli and Fuel Stop</h2>
                            <p className="text-lg mb-6">Your one-stop shop for delicious deli food and fuel services!</p>
                            <img src="https://cdn.pixabay.com/photo/2016/03/31/18/36/qr-code-1295401_1280.png" alt="QR Code" className="mx-auto w-32 h-32" />
                        </section>

                        {/* Promotions Section */}
                        <section id="promotions" className="container mx-auto py-8">
                            <h2 className="text-3xl font-bold mb-6 text-center">Promotions</h2>
                            <div className="bg-yellow-100 p-4 rounded-lg shadow">
                                {promotions.length ? (
                                    promotions.map((promo, index) => (
                                        <p key={index} className="text-lg text-center">{promo}</p>
                                    ))
                                ) : (
                                    <p className="text-center">No promotions available.</p>
                                )}
                            </div>
                        </section>

                        {/* Menu Section */}
                        <section id="menu" className="container mx-auto py-8">
                            <h2 className="text-3xl font-bold mb-6 text-center">Menu</h2>
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                {menuItems.map(item => (
                                    <MenuItem
                                        key={item.name}
                                        item={item}
                                        onAddToCart={addToCart}
                                        onRemoveFromCart={removeFromCart}
                                        isInCart={cartItems.some(cartItem => cartItem.name === item.name)}
                                    />
                                ))}
                            </div>
                        </section>

                        {/* Cart Section */}
                        <Cart
                            cartItems={cartItems}
                            removeFromCart={removeFromCart}
                            taxRate={0.0925}
                            tipAmount={tipAmount}
                            setTipAmount={setTipAmount}
                            onPay={handlePayment}
                        />

                        {/* Reviews Section */}
                        <section id="reviews" className="container mx-auto py-8">
                            <h2 className="text-3xl font-bold mb-6 text-center">Reviews</h2>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div className="bg-white p-4 rounded-lg shadow">
                                    <p className="italic">"Best turkey sandwich in town! The staff are super friendly."</p>
                                    <p className="text-right font-semibold mt-2">- Sarah M.</p>
                                </div>
                                <div className="bg-white p-4 rounded-lg shadow">
                                    <p className="italic">"Quick stop for fuel and a coffee. Always a great experience!"</p>
                                    <p className="text-right font-semibold mt-2">- John D.</p>
                                </div>
                            </div>
                        </section>

                        {/* About Section */}
                        <section id="about" className="container mx-auto py-8">
                            <h2 className="text-3xl font-bold mb-6 text-center">About Us</h2>
                            <div className="flex flex-col md:flex-row items-center">
                                <img src="images/storefront.jpg" alt="Storefront" className="w-full md:w-1/2 h-64 object-cover rounded-lg mb-4 md:mb-0 md:mr-6" />
                                <p className="text-lg">Julie's Fuel Stop, located conveniently in Knoxville, Tennessee, is a one-stop-shop offering a wide range of convenience and specialty products. With over 4 decades of experience as Sam and Jerry's Deli and Market, Julie's continues to fulfill diverse needs of the community. From grocery must-haves to satisfying deli delights and refueling options like high-quality gasoline, customers can find what they need and more. Additionally, Julie's Fuel Stop enhances its unique offerings with a smoke shop, beer collection, and novelty items including vapes, providing an enjoyable shopping experience for all.</p>
                            </div>
                        </section>

                        {/* Contact Section */}
                        <section id="contact" className="container mx-auto py-8">
                            <h2 className="text-3xl font-bold mb-6 text-center">Contact Us</h2>
                            <div className="text-center">
                                <p className="text-lg mb-2">Email: juliesfuelstop@gmail.com</p>
                                <p className="text-lg mb-2">Address: 3522 E Governor John Sevier Hwy, Knoxville, TN 37914</p>
                                <p className="text-lg">Phone: (865) 337-7493</p>
                            </div>
                        </section>

                        {/* Footer */}
                        <footer className="bg-gray-800 text-white p-4 text-center">
                            <p>© 2025 Julie's Deli and Fuel Stop. All rights reserved.</p>
                        </footer>
                    </div>
                </ErrorBoundary>
            );
        };

        // Render the App
        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
